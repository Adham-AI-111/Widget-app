{% extends 'main.html' %}
{% block content %}

    <!-- Profile Header -->
    <!-- <section class="profile-header">
        <div class="container">
            <h1>My Profile</h1>
            <p>Manage your account and view your order history</p>
        </div>
    </section> -->

    <!-- Profile Content -->
    <div class="profile-content">
        <!-- Profile Information -->
        <div class="profile-section">
            <h3>Profile Information</h3>
            <div class="profile-info">
                <div class="info-row">
                    <strong>Name:</strong>
                    <span>{{user.full_name}}</span>
                </div>
                <div class="info-row">
                    <strong>Email:</strong>
                    <span>{{user.email}}</span>
                </div>
                <div class="info-row">
                    <strong>Phone:</strong>
                    <span>{{user.phone}}</span>
                </div>
            </div>
            <a href="{% url 'edit_profile' %}" class="btn-secondary">Edit Profile</a>
        </div>

        <!-- Account Actions -->
        <div class="profile-section">
            <h3>Account Actions</h3>
            <div class="action-buttons">
                <a href="{% url 'reset-password' %}" class="btn-secondary">Change Password</a>
            </div>
        </div>
    </div>

{% endblock %}
