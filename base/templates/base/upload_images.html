{% extends 'main.html' %}
{% block content %}

    <div class="form-order">
        <h2>Upload Order Images</h2>
        <p class="help-text">Optional step. You can add up to 6 images (max 3MB each).</p>

        <form method="POST" enctype="multipart/form-data" action="">
            {% csrf_token %}

            <div class="form-field">
                <label class="form-label" for="images">Select Images</label>
                <input id="images" name="images" type="file" accept="image/*" multiple>
                <span class="help-text">Accepted formats: JPG, PNG, WebP • Max 6 files</span>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">Submit Order</button>
                <a href="{% url 'user_orders' %}" class="btn-secondary">Cancel</a>
            </div>
        </form>
    </div>

{% endblock %}
